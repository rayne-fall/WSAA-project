    function DeleteTV(r){
        var tableElement = document.getElementById('TVTable');
        var rowElement = r.parentNode.parentNode;
        var index = rowElement.rowIndex;
        deleteTVAjax(rowElement.getAttribute("id"));
        tableElement.deleteRow(index);
    }

    function addTVToTable(tvshow){
        var tableElement = document.getElementById('TVTable')
        var rowElement = tableElement.insertRow(-1)
        rowElement.setAttribute('id',tvshow.id)
        var cell1 = rowElement.insertCell(0);
        cell1.innerHTML = tvshow.id
        var cell2 = rowElement.insertCell(1);
        cell2.innerHTML = tvshow.title
        var cell3 = rowElement.insertCell(2);
        cell3.innerHTML = tvshow.genre
        var cell4 = rowElement.insertCell(3);
        cell4.innerHTML = tvshow.year

    function getTVFromRow(rowElement){
        var tvshow ={}
        tvshow.id  = rowElement.getAttribute('id')
        tvshow.title = rowElement.cells[1].firstChild.textContent
        tvshow.genre = rowElement.cells[2].firstChild.textContent
        tvshow.year = parseInt(rowElement.cells[3].firstChild.textContent,10)
        return tvshow
    }

    function getAllTVAjax(){
        $.ajax({
            "url": "/tvshows",
            "method":"GET",
            "data":"",
            "dataType": "JSON",
            "success":function(result){
                for (tvshow of result){
                    addTVToTable(tvshow);
                }
                
            },
            "error":function(xhr,status,error){
                console.log("error: "+status+" msg:"+error);
            }
        });

    function createTVAjax(tvshow){
        console.log(JSON.stringify(tvshow));
        $.ajax({
            "url": "/tvshows",
            "method":"POST",
            "data":JSON.stringify(tvshow),
            "dataType": "JSON",
            contentType: "application/json; charset=utf-8",
            "success":function(result){
                tvshow.id = result.id
                addTVToTable(tvshow)
                clearForm()
                showViewAll()
            },
            "error":function(xhr,status,error){
